{% extends 'base/base.html' %}

{% block page_content %}
<form method="POST">
    {% csrf_token %}
    <div class="col-xl-4 col-md-6 mb-4">
        <div class="card border-left-danger shadow h-100 py-2">
            <div class="card-body">
                <div class="text-base font-weight-bold text-warning text-uppercase mb-1">
                    ¿Eliminar el punto de venta "{{ obj.nombre }}"?
                </div>
                <button type="submit" class="btn btn-danger"><i class="far fa-question-circle"></i> Sí, Eliminar</button>
                <a href="{% url 'fe:sucursal_edit' obj.sucursal.id %}" class="btn btn-success"><span class="fa fa-undo"></span> Cancelar</a>
            </div>
        </div>
    </div>
</form>
{% endblock %}

{% block js_page %}
{% endblock %}
